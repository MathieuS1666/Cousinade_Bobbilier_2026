<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Liste des Plats - Événement Familial</title>
    <style>
        body {
            font-family: Arial, sans-serif;
            max-width: 600px;
            margin: 0 auto;
            padding: 20px;
            text-align: center;
        }
        h1 {
            color: #2c3e50;
        }
        #platsListe {
            text-align: left;
            margin: 20px 0;
        }
        #platsListe li {
            padding: 10px;
            background-color: #f9f9f9;
            margin: 5px 0;
            border-radius: 4px;
            list-style-type: none;
        }
        .plat-item {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
            margin-bottom: 5px;
        }
        .plat-info {
            flex: 1;
        }
        .plat-categories {
            margin-top: 5px;
            font-size: 14px;
        }
        .plat-categories label {
            margin-right: 10px;
        }
        input, button {
            padding: 8px;
            margin: 5px 0;
            width: 100%;
            box-sizing: border-box;
        }
        button {
            background-color: #3498db;
            color: white;
            border: none;
            cursor: pointer;
            margin-top: 5px;
        }
        button:hover {
            background-color: #2980b9;
        }
        .supprimer-btn {
            background-color: #e74c3c;
            padding: 5px;
            width: 80px;
            font-size: 12px;
            white-space: nowrap;
            margin-left: 10px;
        }
        .supprimer-btn:hover {
            background-color: #c0392b;
        }
        .form-group {
            margin-bottom: 10px;
        }
    </style>
</head>
<body>
    <h1>Liste des Plats pour l'Événement Familial</h1>
    <p>Merci d'indiquer ce que vous allez apporter, votre nom, le nombre de parts et le type de plat !</p>

    <div class="form-group">
        <input type="text" id="nomPersonne" placeholder="Votre nom">
    </div>
    <div class="form-group">
        <input type="text" id="nouveauPlat" placeholder="Ex: Tarte aux pommes, Salade de pâtes...">
    </div>
    <div class="form-group">
        <input type="number" id="nombreParts" placeholder="Nombre de parts" min="1">
    </div>
    <button onclick="ajouterPlat()">Ajouter mon plat</button>

    <h2>Liste des plats déjà proposés :</h2>
    <ul id="platsListe"></ul>

    <script>
        // Liste des plats avec nom, nombre de parts et catégories
        let plats = [];

        // Charger les plats depuis le stockage local (si disponible)
        if (localStorage.getItem('platsFamille')) {
            plats = JSON.parse(localStorage.getItem('platsFamille'));
            afficherPlats();
        }

        function ajouterPlat() {
            const nomInput = document.getElementById('nomPersonne');
            const platInput = document.getElementById('nouveauPlat');
            const partsInput = document.getElementById('nombreParts');

            const nom = nomInput.value.trim();
            const plat = platInput.value.trim();
            const parts = parseInt(partsInput.value);

            if (nom && plat && !isNaN(parts) && parts > 0) {
                // Par défaut, aucune case n'est cochée
                plats.push({ nom, plat, parts, apero: false, entree: false, platPrincipal: false, dessert: false });
                localStorage.setItem('platsFamille', JSON.stringify(plats));
                afficherPlats();
                nomInput.value = '';
                platInput.value = '';
                partsInput.value = '';
                alert('Merci pour votre contribution !');
            } else {
                alert('Veuillez remplir tous les champs correctement.');
            }
        }

        function supprimerPlat(index) {
            plats.splice(index, 1);
            localStorage.setItem('platsFamille', JSON.stringify(plats));
            afficherPlats();
        }

        function mettreAJourCategorie(index, categorie) {
            plats[index][categorie] = !plats[index][categorie];
            localStorage.setItem('platsFamille', JSON.stringify(plats));
            afficherPlats();
        }

        function afficherPlats() {
            const liste = document.getElementById('platsListe');
            liste.innerHTML = plats.map((item, index) => `
                <li>
                    <div class="plat-item">
                        <div class="plat-info">
                            <span><strong>${item.nom}</strong> apporte <em>${item.plat}</em> (${item.parts} part${item.parts > 1 ? 's' : ''}).</span>
                            <div class="plat-categories">
                                <label><input type="checkbox" ${item.apero ? 'checked' : ''} onchange="mettreAJourCategorie(${index}, 'apero')"> Apéro</label>
                                <label><input type="checkbox" ${item.entree ? 'checked' : ''} onchange="mettreAJourCategorie(${index}, 'entree')"> Entrée</label>
                                <label><input type="checkbox" ${item.platPrincipal ? 'checked' : ''} onchange="mettreAJourCategorie(${index}, 'platPrincipal')"> Plat</label>
                                <label><input type="checkbox" ${item.dessert ? 'checked' : ''} onchange="mettreAJourCategorie(${index}, 'dessert')"> Dessert</label>
                            </div>
                        </div>
                        <button class="supprimer-btn" onclick="supprimerPlat(${index})">Supprimer</button>
                    </div>
                </li>
            `).join('');
        }
    </script>
</body>
</html>
